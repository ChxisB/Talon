<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ear tufts -->
  <path d="M340 280 Q220 180 260 110 Q290 180 370 260 Z" fill="url(#primary)"/>
  <path d="M684 280 Q804 180 764 110 Q734 180 654 260 Z" fill="url(#primary)"/>

  <!-- Head -->
  <path d="M512 220 
           Q360 240 300 380 
           Q260 480 300 560 
           Q340 640 420 680 
           Q470 700 512 710 
           Q554 700 604 680 
           Q684 640 724 560 
           Q764 480 724 380 
           Q664 240 512 220 Z"
        fill="url(#primary)"/>

  <!-- Face mask -->
  <path d="M512 310 
           Q400 330 360 430 
           Q330 510 370 570 
           Q400 620 460 650 
           Q490 660 512 665 
           Q534 660 564 650 
           Q624 620 654 570 
           Q694 510 664 430 
           Q624 330 512 310 Z"
        fill="#1e1b4b" opacity="0.35"/>

  <!-- Eyes -->
  <g filter="url(#glow)">
    <path d="M390 420 L440 380 L480 430 L440 460 Z" fill="#fbbf24"/>
    <path d="M420 420 L440 400 L460 430 L440 445 Z" fill="#1e1b4b"/>
  </g>
  <g filter="url(#glow)">
    <path d="M634 420 L584 380 L544 430 L584 460 Z" fill="#fbbf24"/>
    <path d="M604 420 L584 400 L564 430 L584 445 Z" fill="#1e1b4b"/>
  </g>

  <!-- Beak -->
  <path d="M480 520 L512 590 L544 520 L512 700 Z" fill="url(#accent)"/>
  <path d="M480 520 L512 590 L512 700 Z" fill="#d97706" opacity="0.5"/>

  <!-- Chevron feathers -->
  <g stroke="url(#primary)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M330 470 L290 495 L330 520"/>
    <path d="M350 540 L310 565 L350 590"/>
    <path d="M380 600 L340 625 L380 650"/>
    <path d="M694 470 L734 495 L694 520"/>
    <path d="M674 540 L714 565 L674 590"/>
    <path d="M644 600 L684 625 L644 650"/>
  </g>

  <!-- Blinking cursor -->
  <rect x="500" y="740" width="24" height="24" rx="4" fill="url(#accent)" opacity="0.9">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Talon claw marks -->
  <g transform="translate(512, 830)" fill="none" stroke="url(#accent)" stroke-width="9" stroke-linecap="round" opacity="0.35">
    <path d="M-40 0 Q-60 -25 -45 -65 Q-40 -80 -20 -65"/>
    <path d="M0 0 Q10 -35 0 -75 Q-5 -90 12 -75"/>
    <path d="M40 0 Q60 -25 45 -65 Q40 -80 20 -65"/>
  </g>
</svg>
