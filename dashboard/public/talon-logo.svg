<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Core brand gradient -->
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <!-- Accent glow -->
    <linearGradient id="accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <!-- Eye glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background shield/hexagon (command center feel) -->
  <path d="M512 40 L872 216 L872 568 Q872 780 512 984 Q152 780 152 568 L152 216 Z"
        fill="url(#primary)" opacity="0.08"/>

  <!-- Ear tufts / feather crests -->
  <path d="M340 280 Q260 200 280 140 Q300 200 370 260 Z" fill="url(#primary)"/>
  <path d="M684 280 Q764 200 744 140 Q724 200 654 260 Z" fill="url(#primary)"/>

  <!-- Main head shape - geometric falcon -->
  <path d="M512 240 
           Q380 260 320 380 
           Q280 460 300 540 
           Q320 620 380 660 
           Q440 700 512 720 
           Q584 700 644 660 
           Q704 620 724 540 
           Q744 460 704 380 
           Q644 260 512 240 Z"
        fill="url(#primary)"/>

  <!-- Lighter face/mask area -->
  <path d="M512 320 
           Q420 340 380 420 
           Q350 480 360 540 
           Q380 600 420 630 
           Q460 650 512 660 
           Q564 650 604 630 
           Q644 600 664 540 
           Q674 480 644 420 
           Q604 340 512 320 Z"
        fill="#1e1b4b" opacity="0.3"/>

  <!-- Left eye -->
  <g filter="url(#glow)">
    <path d="M400 420 L440 390 L470 430 L440 460 Z" fill="#fbbf24"/>
    <path d="M420 420 L440 405 L455 430 L440 445 Z" fill="#1e1b4b"/>
  </g>

  <!-- Right eye -->
  <g filter="url(#glow)">
    <path d="M624 420 L584 390 L554 430 L584 460 Z" fill="#fbbf24"/>
    <path d="M604 420 L584 405 L569 430 L584 445 Z" fill="#1e1b4b"/>
  </g>

  <!-- Beak (sharp, geometric) -->
  <path d="M490 520 L512 580 L534 520 L512 680 Z" fill="url(#accent)"/>
  <path d="M490 520 L512 580 L512 680 Z" fill="#d97706" opacity="0.5"/>

  <!-- Chevron feathers (angle brackets / terminal vibe) -->
  <g stroke="url(#primary)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6">
    <!-- Left side chevrons -->
    <path d="M340 480 L310 500 L340 520"/>
    <path d="M360 540 L330 560 L360 580"/>
    <path d="M390 590 L360 610 L390 630"/>
    <!-- Right side chevrons -->
    <path d="M684 480 L714 500 L684 520"/>
    <path d="M664 540 L694 560 L664 580"/>
    <path d="M634 590 L664 610 L634 630"/>
  </g>

  <!-- Terminal cursor accent dot below beak -->
  <rect x="500" y="720" width="24" height="24" rx="4" fill="url(#accent)" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Talon claw mark at bottom -->
  <g transform="translate(512, 800)" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
    <!-- Left talon curve -->
    <path d="M-30 0 Q-50 -20 -40 -50 Q-35 -65 -20 -55"/>
    <!-- Middle talon curve -->
    <path d="M0 0 Q10 -25 0 -60 Q-5 -75 10 -65"/>
    <!-- Right talon curve -->
    <path d="M30 0 Q50 -20 40 -50 Q35 -65 20 -55"/>
  </g>

  <!-- Name text -->
  <text x="512" y="920" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="72" font-weight="700" fill="url(#primary)" letter-spacing="12">
    TALON
  </text>
</svg>
